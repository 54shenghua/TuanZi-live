<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团子直播admin</title>
    <link rel="stylesheet" href="admin.css">
    <script src="vue.js"></script>
</head>
<link rel="stylesheet" href="//unpkg.com/layui@2.6.8/dist/css/layui.css">

<body>
    <div class="bk"></div>
    <div class="all">
        <div class="allTop">
            <div class="image"></div>
            <div class="header">
                <div class="bkgd"><br/></div>
                <h1 class="bkgd">小团子直播ui</h1>
            </div>
        </div>
        <div id="app">
            <div class="inputbox">
                <fieldset style="width: 800px; text-align: center;">
                    <legend>输入框</legend>
                    <div>
                        <label>
                        选项：<input type="text" class="inp1" v-model="option" placeholder="...">
                    </label>
                        <label>
                        内容：<input type="text" class="inp2" v-model="content" placeholder="请输入内容...">
                    </label>
                        <input type="button" value="+添加" class="button layui-btn layui-btn-normal layui-btn-radius" @click="add()"></input>
                        <input type="submit" value="∨提交" class="button layui-btn layui-btn-normal layui-btn-radius" @click="toSubmit()"></input>
                        <input type="button" value="▤表单" class="button layui-btn layui-btn-normal layui-btn-radius"></input>
                    </div>
                    <br/>
                </fieldset>
            </div>
            <br />
            <table>
                <thead>
                    <tr class="table-head">
                        <th style="width: 10%;">选项</th>
                        <th>内容</th>
                        <th style="width:10%;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="item in list" :key="item.option">
                        <td>{{item.option}}</td>
                        <td>{{item.content}}</td>
                        <td>
                            <a href=" " @click.prevent="del(item.option)">
                                <button type="button" class="layui-btn layui-btn-danger layui-btn-radius">
                                    删除
                                </button>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        var vm = new Vue({
            el: '#app',
            data: {
                option: '',
                content: '',
                list: [{
                    option: '',
                    content: ''
                }]
            },
            methods: {
                add() {
                    var car = {
                        option: this.option,
                        content: this.content
                    }
                    this.list.push(car)
                },
                del(option) {
                    var index = this.list.findIndex(item => {
                        if (item.option == option) {
                            return true;
                        }
                    })
                    this.list.splice(index, 1)
                },
                toSubmit() {
                    var l = this.list.length
                    alert("提交成功")
                    for (let i = 1; i <= l; i++) {
                        this.list.pop()
                        console.log("i=" + i)
                        console.log("length=" + this.list.length)
                    }
                }
            }
        });
    </script>
</body>

</html>
