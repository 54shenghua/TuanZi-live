<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="echarts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        *{
    margin: 0;
    padding: 0;
    }
    
    #chart{
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        min-height: 100%;
        height: auto;
        z-index: 0;
       }
    #tuanzi{
        position: absolute;
        opacity: 0.2;
        z-index: 1;
        height: 50%;
        right: 5%;
        bottom: 5%;
        
    }
    </style>
</head>
<body">
    <div> 
        <img src="https://pic.imgdb.cn/item/63747f3b16f2c2beb1c983f7.png" id="tuanzi">
        <div style="width: 100%;height: 100%;" id = 'chart'></div>
    </div>
    <script>
        
        var keys = new Array();
        var values = new Array();


        function Api(){
            axios.get('(api接口地址)')
            .then(function (response) {
            var dic = response;
            keys = Object.keys(dic);
            values = Object.values(dic);
        })
        }
        
       
        //charts部分
        var mCharts = echarts.init(document.querySelector('#chart'))
        window.onresize = function(){
            mCharts.resize();
        }
        const data = [];
        for (let i = 0; i < 5; ++i) {
        data[i] = values[i];
        }
        var option = {
        xAxis: {
            type: 'value',
            max: 'dataMax'
        },
        yAxis: {
            type: 'category',
            data: ['A','B','C','D','E'],
            inverse: true,
            animationDuration: 300,
            animationDurationUpdate: 300,
            max: 2 // 展示前三个
        },
        series: [
            {
                realtimeSort: true,
                type: 'bar',
                data:data,
                label: {
                    show: true,
                    position: 'right',
                    valueAnimation: true
                }
            }
        ],
        legend: {
        show: true
        },
        animationDuration: 0,
        animationDurationUpdate: 3000,
        animationEasing: 'linear',
        animationEasingUpdate: 'linear'
        };

        setInterval(function(){
            Api();
        },500);
        
        option && mCharts.setOption(option);

    </script>
</body>
</html>
